name: Publish recovery snapshot
on:
  schedule: [{ cron: '17 */6 * * *' }]
  workflow_dispatch:
permissions: { contents: write }
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: python3 scripts/build_snapshot.py --output dist
      - run: gh release view recovery-latest || gh release create recovery-latest --title 'WhyLowDps recovery data' --notes 'Automated recovery data snapshot.' --latest=false
        env: { GH_TOKEN: '${{ github.token }}' }
      - run: gh release upload recovery-latest "dist/$(jq -r '.archive.name' dist/manifest.json)" --clobber
        env: { GH_TOKEN: '${{ github.token }}' }
      - run: gh release upload recovery-latest dist/manifest.json --clobber
        env: { GH_TOKEN: '${{ github.token }}' }
